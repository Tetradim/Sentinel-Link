<!doctype html>
<html lang="en">
  <head>
    <meta charset="utf-8" />
    <title>Discord Alert Bridge</title>
    <link rel="stylesheet" href="popup.css" />
  </head>
  <body>
    <main>
      <h1>Discord Bridge</h1>
      <label class="toggle">
        <input id="enabled" type="checkbox" />
        <span>Forward visible Discord messages</span>
      </label>

      <label class="toggle">
        <input id="forwardExistingOnEnable" type="checkbox" />
        <span>Also forward messages already visible when enabling</span>
      </label>

      <label class="toggle">
        <input id="autoRestartEnabled" type="checkbox" />
        <span>Auto-restart bridge supervisor</span>
      </label>

      <label>
        First target message URL
        <input id="targetUrl" type="url" />
      </label>

      <label>
        First target health URL
        <input id="heartbeatUrl" type="url" />
      </label>

      <label>
        API key
        <input id="apiKey" type="password" autocomplete="off" />
      </label>

      <label>
        Bot targets JSON
        <textarea id="targetsJson" rows="12" spellcheck="false"></textarea>
      </label>

      <button id="save" type="button">Save</button>
      <p id="status"></p>

      <section class="general-api-section">
        <h2>General API</h2>
        <p class="help">Archive replays and brokers. Sentinel Link only records observed Discord alerts; it never creates trades.</p>
        <label class="toggle"><input id="generalApiEnabled" type="checkbox" /><span>Publish observations to Archive</span></label>
        <label>Archive base URL<input id="generalApiBaseUrl" type="url" /></label>
        <label>Replay run ID<input id="generalApiRunId" type="text" /></label>
        <label>Participant ID<input id="generalApiParticipantId" type="text" /></label>
        <label>Observed symbols<input id="generalApiSymbols" type="text" placeholder="SPY, TSLA" /></label>
        <label>Participant token<input id="generalApiToken" type="password" autocomplete="off" placeholder="Saved locally after registration" /></label>
        <div class="button-row">
          <button id="saveGeneralApi" type="button">Save</button>
          <button id="testGeneralApi" type="button">Test</button>
          <button id="registerGeneralApi" type="button">Register</button>
        </div>
        <p id="generalApiStatus"></p>
      </section>
    </main>
    <script src="bridge_config.js"></script>
    <script src="popup.js"></script>
  </body>
</html>
