<!doctype html>
<html lang="en">
  <head>
    <meta charset="utf-8">
    <title>Copy Repost Helper</title>
    <link rel="stylesheet" href="styles.css">
  </head>
  <body>
    <main>
      <h1>Copy Repost</h1>

      <label class="check-row">
        <input id="enabled" type="checkbox">
        <span>Enabled</span>
      </label>

      <label class="field">
        <span>Helper token</span>
        <input id="helper-token" type="password" autocomplete="off" spellcheck="false">
      </label>

      <label class="check-row muted">
        <input id="show-token" type="checkbox">
        <span>Show token</span>
      </label>

      <section class="channel-section" aria-labelledby="listen-heading">
        <h2 id="listen-heading">Listen</h2>
        <label class="field">
          <span>Discord channel URL</span>
          <input id="listen-url" type="text" autocomplete="off" spellcheck="false" placeholder="https://discord.com/channels/...">
        </label>
        <div class="actions three">
          <button id="listen-lock" type="button">Lock</button>
          <button id="listen-revert" type="button">Revert</button>
          <button id="listen-revert-all" type="button">Revert All</button>
        </div>
        <p id="listen-message" class="message" role="status"></p>
        <p id="listen-summary" class="summary"></p>
        <label class="field compact">
          <span>Stored Listen URLs</span>
          <select id="listen-stored-urls" class="route-select"></select>
        </label>
      </section>

      <section class="channel-section" aria-labelledby="post-heading">
        <h2 id="post-heading">Post</h2>
        <label class="field">
          <span>Discord channel URL</span>
          <input id="post-url" type="text" autocomplete="off" spellcheck="false" placeholder="https://discord.com/channels/...">
        </label>
        <div class="actions">
          <button id="post-lock" type="button">Lock</button>
          <button id="post-revert" type="button">Revert</button>
        </div>
        <p id="post-message" class="message" role="status"></p>
        <p id="post-summary" class="summary"></p>
        <label class="field compact">
          <span>Stored Post URLs</span>
          <select id="post-stored-urls" class="route-select"></select>
        </label>
      </section>

      <dl>
        <dt>Helper</dt>
        <dd id="helper-status">loading</dd>
        <dt>Status</dt>
        <dd id="last-status">loading</dd>
      </dl>

      <div class="actions">
        <button id="save" type="button">Save</button>
        <button id="refresh" type="button">Refresh</button>
      </div>
    </main>
    <script src="channel-routes.js"></script>
    <script src="popup.js"></script>
  </body>
</html>
